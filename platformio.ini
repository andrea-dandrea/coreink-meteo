[env:coreink]
platform = espressif32
board = m5stack-coreink
framework = arduino
monitor_speed = 115200
upload_port = COM7
upload_speed = 115200
board_build.partitions = coreink_partitions.csv
extra_scripts = pre:scripts/fix_i2c_guard.py
lib_deps =
    m5stack/M5GFX@^0.2.20
    m5stack/M5Core-Ink@^1.0.0
    m5stack/M5Unit-ENV@1.0.1
    mikalhart/TinyGPSPlus@^1.0.3
    https://github.com/tzapu/WiFiManager.git
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_COREINK=1
    -ffunction-sections
    -fdata-sections
build_unflags = -Wl,--no-gc-sections
board_build.f_flash = 80000000L

; === Build LITE per partizione default 1.25 MB (senza BLE, data logger, gps_extra) ===
[env:coreink_lite]
platform = espressif32
board = m5stack-coreink
framework = arduino
monitor_speed = 115200
upload_port = COM7
upload_speed = 115200
board_build.partitions = default.csv
extra_scripts = pre:scripts/fix_i2c_guard.py
lib_deps =
    m5stack/M5GFX@^0.2.20
    m5stack/M5Core-Ink@^1.0.0
    m5stack/M5Unit-ENV@1.0.1
    mikalhart/TinyGPSPlus@^1.0.3
    https://github.com/tzapu/WiFiManager.git
build_src_filter = +<*> -<data_logger.cpp> -<gps_extra.cpp> -<ble_ota.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_COREINK=1
    '-DFW_VERSION="1.2.7"'
    -DBLE_OTA_ENABLED=0
    -DBLE_ENABLED=0
    -DDATA_LOGGER_ENABLED=0
    -DGPS_EXTRA_ENABLED=0
    -ffunction-sections
    -fdata-sections
build_unflags = -Wl,--no-gc-sections
board_build.f_flash = 80000000L

; === Build LITE OTA (upload via WiFi, partizione default) ===
[env:coreink_lite_ota]
platform = espressif32
board = m5stack-coreink
framework = arduino
monitor_speed = 115200
upload_protocol = espota
upload_port = 192.168.1.92
board_build.partitions = default.csv
extra_scripts = pre:scripts/fix_i2c_guard.py
lib_deps =
    m5stack/M5GFX@^0.2.20
    m5stack/M5Core-Ink@^1.0.0
    m5stack/M5Unit-ENV@1.0.1
    mikalhart/TinyGPSPlus@^1.0.3
    https://github.com/tzapu/WiFiManager.git
build_src_filter = +<*> -<data_logger.cpp> -<gps_extra.cpp> -<ble_ota.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_COREINK=1
    -DBLE_OTA_ENABLED=0
    -DBLE_ENABLED=0
    -DDATA_LOGGER_ENABLED=0
    -DGPS_EXTRA_ENABLED=0
    '-DFW_VERSION="1.2.7"'
    -ffunction-sections
    -fdata-sections
build_unflags = -Wl,--no-gc-sections
board_build.f_flash = 80000000L

[env:stickcplus2]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_deps =
    m5stack/M5StickCPlus2@^1.0.2
    m5stack/M5Unit-ENV@1.0.1
    mikalhart/TinyGPSPlus@^1.0.3
    https://github.com/tzapu/WiFiManager.git
lib_ignore = DFRobot_GP8XXX
extra_scripts = pre:scripts/fix_i2c_guard.py
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_STICKCPLUS2=1

; === Ambienti OTA (upload via WiFi) ===
; Usare: pio run -e coreink_ota -t upload
; Sostituire upload_port con l'IP effettivo del dispositivo.

[env:coreink_ota]
platform = espressif32
board = m5stack-coreink
framework = arduino
monitor_speed = 115200
upload_protocol = espota
upload_port = coreink-meteo.local  ; oppure IP diretto es. 192.168.1.100
board_build.partitions = coreink_partitions.csv
extra_scripts = pre:scripts/fix_i2c_guard.py
lib_deps =
    m5stack/M5GFX@^0.2.20
    m5stack/M5Core-Ink@^1.0.0
    m5stack/M5Unit-ENV@1.0.1
    mikalhart/TinyGPSPlus@^1.0.3
    https://github.com/tzapu/WiFiManager.git
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_COREINK=1
    -ffunction-sections
    -fdata-sections
build_unflags = -Wl,--no-gc-sections
board_build.f_flash = 80000000L

[env:stickcplus2_ota]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
upload_protocol = espota
upload_port = coreink-meteo.local  ; oppure IP diretto
lib_deps =
    m5stack/M5StickCPlus2@^1.0.2
    m5stack/M5Unit-ENV@1.0.1
    mikalhart/TinyGPSPlus@^1.0.3
    https://github.com/tzapu/WiFiManager.git
lib_ignore = DFRobot_GP8XXX
extra_scripts = pre:scripts/fix_i2c_guard.py
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_STICKCPLUS2=1
